# Project information
site_name: Navify Docs
site_author: Navify Team

# Repository
repo_name: navify/navify-docs
repo_url: https://github.com/navify/navify-docs
edit_uri: "edit/main/docs"

# Copyright
copyright: Copyright &copy; 2022-present Navify

# Configuration
theme:
  name: material

  icon:
    repo: fontawesome/brands/github

  # Don't include Docums' JavaScript
  include_search_page: false
  search_index_only: true

  # Default values, taken from docums_theme.yml
  language: en
  features:
    - content.code.annotate
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
  palette:
    - scheme: default
      primary: light blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: light blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.svg
  logo: assets/logo.svg

# Plugins
plugins:
  - search
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

# Customization
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/navify

extra_css:
  - stylesheets/extra.css

# Extensions
markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: '#'
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: navify
      repo: navify-docs
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Getting Started:
      - Overview: index.md
      - Environment Setup: intro/environment.md
      - Installing Navify: intro/cli.md
      - Package & CDN: intro/cdn.md
      - Next Steps: intro/next.md
  - Developing:
      - Starting an App: developing/starting.md
      - Previewing: developing/previewing.md
      - Development for iOS: developing/ios.md
      - Development for Android: developing/android.md
      - Hardware Back Button: developing/hardware-back-button.md
      - Keyboard: developing/keyboard.md
  - Kdu:
      - Overview: kdu/overview.md
      # - Quickstart: kdu/quickstart.md
